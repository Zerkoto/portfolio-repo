        (function () {
            const storedTheme = localStorage.getItem("portfolio-theme");

        }());

<body>
    <div id="app">
        <svg class="loading-progress" aria-label="Loading portfolio">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        Something went wrong while displaying the portfolio.
        <a href="" class="reload">Reload</a>
        <button type="button" class="dismiss">Dismiss</button>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.portfolioTheme = {
            isDark: function () {
                return document.documentElement.dataset.theme !== "light";
            },
            toggle: function () {
                const nextTheme = this.isDark() ? "light" : "dark";
                document.documentElement.dataset.theme = nextTheme;
                localStorage.setItem("portfolio-theme", nextTheme);
                document.querySelector('meta[name="theme-color"]')
                    .setAttribute("content", nextTheme === "dark" ? "#0c0d0f" : "#f4f5f2");
                return nextTheme === "dark";
            }
        };

        window.portfolioNavigation = {
            scrollToCurrentHash: function () {
                const requestedHash = window.location.hash;
                const targetId = decodeURIComponent(requestedHash.replace(/^#/, ""));
                if (!targetId) {
                    return;
                }

                const alignTarget = function () {
                    if (window.location.hash !== requestedHash) {
                        return;
                    }

                    const target = document.getElementById(targetId);
                    if (target) {
                        target.scrollIntoView({ block: "start" });
                    }
                };

                alignTarget();

                const observer = new MutationObserver(alignTarget);
                observer.observe(document.getElementById("app"), {
                    childList: true,
                    subtree: true
                });

                window.setTimeout(function () {
                    alignTarget();
                    observer.disconnect();
                }, 1000);
            }
        };

        document.addEventListener("click", function (event) {
            if (event.target.classList.contains("dismiss")) {
                document.getElementById("blazor-error-ui").style.display = "none";
            }
        });
    </script>
</body>

</html>
